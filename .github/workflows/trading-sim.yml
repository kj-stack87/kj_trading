name: Trading Simulation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/trading-sim.yml"
      - "config.example.json"
      - "scripts/**"
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: trading-simulation
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run one trading cycle
        run: node scripts/actions-cycle.js

      - name: Commit dashboard snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No dashboard changes"
          else
            git commit -m "Update trading dashboard snapshot"
            git push
          fi
